<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Crash • BC Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        #graph-canvas {
            width: 100%;
            height: 260px;
            background: linear-gradient(to bottom, #18181b 0%, #09090b 100%);
            border-radius: 16px;
            border: 2px solid #27272a;
        }

        .multiplier {
            font-size: 4.5rem;
            line-height: 1;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            text-shadow: 0 0 30px currentColor;
        }

        .history-panel {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dot {
            box-shadow: 0 0 12px currentColor;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-8">
    <div class="max-w-md mx-auto bg-zinc-900 min-h-screen overflow-hidden border-x border-zinc-800 shadow-2xl">
        
        <!-- TOP BAR -->
        <div class="bg-black px-4 py-3 flex items-center justify-between border-b border-zinc-800">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-orange-500 to-amber-500 rounded-2xl flex items-center justify-center text-3xl">💥</div>
                <div class="title-font text-3xl font-bold tracking-tighter">CRASH</div>
            </div>
            <div onclick="toggleHistory()" 
                 class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-700 transition-colors px-5 py-2 rounded-3xl text-sm font-medium cursor-pointer">
                📜 <span class="font-mono">HISTORY</span>
            </div>
            <div class="flex items-center gap-2 bg-zinc-950 rounded-3xl px-5 py-1 text-sm font-medium border border-zinc-700">
                <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                NGN <span id="balance" class="font-mono font-bold">2,148.67</span>
            </div>
        </div>

        <!-- RECENT MULTIPLIERS BAR -->
        <div class="px-4 py-4 bg-zinc-950 border-b border-zinc-800 overflow-x-auto">
            <div id="recent-bar" class="flex gap-6 whitespace-nowrap"></div>
        </div>

        <!-- MAIN GAME AREA -->
        <div class="px-4 pt-4">
            
            <!-- GRAPH -->
            <div class="relative">
                <canvas id="graph-canvas" width="400" height="260"></canvas>
                
                <!-- OVERLAY MULTIPLIER -->
                <div id="multiplier-display" 
                     class="absolute top-8 left-1/2 -translate-x-1/2 text-center pointer-events-none">
                    <div id="mult-value" class="multiplier text-emerald-400">1.00</div>
                    <div class="text-xs tracking-[3px] text-zinc-400 font-medium -mt-2">x</div>
                </div>
                
                <!-- STATUS -->
                <div id="status-text" 
                     class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/70 px-6 py-1 rounded-3xl text-sm font-medium text-zinc-300">
                    PLACE YOUR BET
                </div>
            </div>

            <!-- BET CONTROLS -->
            <div class="mt-6 bg-zinc-950 border border-zinc-800 rounded-3xl p-5">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-zinc-400 text-sm font-medium">BET AMOUNT</span>
                    <span id="bet-amount-display" class="font-mono text-2xl font-bold text-white">100</span>
                </div>
                
                <!-- Quick bet buttons -->
                <div class="grid grid-cols-4 gap-2 mb-5">
                    <button onclick="quickBet(50)" 
                            class="bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-700 text-xs py-3 rounded-2xl font-medium">+50</button>
                    <button onclick="quickBet(100)" 
                            class="bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-700 text-xs py-3 rounded-2xl font-medium">+100</button>
                    <button onclick="quickBet(250)" 
                            class="bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-700 text-xs py-3 rounded-2xl font-medium">+250</button>
                    <button onclick="quickBet(500)" 
                            class="bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-700 text-xs py-3 rounded-2xl font-medium">MAX</button>
                </div>

                <input id="bet-input" 
                       type="number" 
                       value="100" 
                       oninput="updateBetDisplay()"
                       class="w-full bg-zinc-900 border border-zinc-700 text-center text-4xl font-bold font-mono py-4 rounded-3xl focus:outline-none focus:border-emerald-500">

                <!-- ACTION BUTTON -->
                <button id="action-btn"
                        onclick="handleAction()"
                        class="mt-5 w-full py-6 text-2xl font-bold rounded-3xl transition-all active:scale-95 bg-emerald-500 text-black">
                    BET
                </button>
            </div>
        </div>

        <!-- HIDDEN HISTORY PANEL -->
        <div id="history-panel" class="history-panel hidden mt-8 px-4">
            <div class="flex items-center justify-between mb-4">
                <div class="text-lg font-semibold flex items-center gap-2">
                    <span>ROUND HISTORY</span>
                    <span class="text-[10px] bg-emerald-500 text-black px-2 py-px rounded">LIVE</span>
                </div>
                <button onclick="toggleHistory()" 
                        class="text-zinc-400 text-sm">CLOSE ×</button>
            </div>

            <!-- Table header -->
            <div class="grid grid-cols-12 text-[10px] font-medium text-zinc-400 py-3 border-b border-zinc-800 px-2">
                <div class="col-span-5">GAME ID</div>
                <div class="col-span-3 text-center">RESULT</div>
                <div class="col-span-4 text-right">HASH</div>
            </div>

            <!-- History rows -->
            <div id="history-list" class="max-h-[340px] overflow-y-auto divide-y divide-zinc-800 text-sm"></div>
        </div>

        <!-- FOOTER -->
        <div class="text-center text-[10px] text-zinc-500 mt-8">
            Tap BET to start • Cash out anytime • Shake phone for instant round
        </div>
    </div>

    <script>
        // ====================== CONFIG & STATE ======================
        let balance = 2148.67;
        let currentBet = 100;
        let multiplier = 1.00;
        let isFlying = false;
        let crashed = false;
        let cashOutMultiplier = 0;
        let crashPoint = 0;
        let animationFrame = null;
        let startTime = 0;
        let graphPoints = [];           // {x: number, y: number} for canvas
        let historyData = [
            { id: "9032252", mult: 1.02, hash: "baaf37d2525d..." },
            { id: "9032251", mult: 28.20, hash: "eb6bef3e55b0..." },
            { id: "9032250", mult: 8.45, hash: "208525d1f9d53..." },
            { id: "9032249", mult: 1.02, hash: "442b15ed0072..." },
            { id: "9032248", mult: 1.59, hash: "5b223ccb9051..." }
        ];
        let nextGameId = 9032253;

        const canvas = document.getElementById("graph-canvas");
        const ctx = canvas.getContext("2d");
        const multEl = document.getElementById("mult-value");
        const statusEl = document.getElementById("status-text");
        const actionBtn = document.getElementById("action-btn");
        const balanceEl = document.getElementById("balance");

        // ====================== CONTROLLED RANDOM (spied from real BC.Game) ======================
        function generateCrashPoint() {
            const roll = Math.random();
            if (roll < 0.53) return parseFloat((1 + Math.random() * 0.99).toFixed(2));      // 1.00 - 1.99
            if (roll < 0.78) return parseFloat((2 + Math.random() * 7.99).toFixed(2));      // 2.00 - 9.99
            if (roll < 0.93) return parseFloat((10 + Math.random() * 19.99).toFixed(2));    // 10 - 29.99
            return parseFloat((30 + Math.random() * 150).toFixed(2));                       // 30x+
        }

        function generateFakeHash() {
            const chars = "abcdef0123456789";
            let hash = "";
            for (let i = 0; i < 13; i++) hash += chars[Math.floor(Math.random() * chars.length)];
            return hash + "...";
        }

        // ====================== GRAPH DRAWING ======================
        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background grid
            ctx.strokeStyle = "#27272a";
            ctx.lineWidth = 1;
            for (let i = 1; i < 5; i++) {
                const y = (canvas.height / 5) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            if (graphPoints.length < 2) return;

            // Line
            ctx.strokeStyle = crashed ? "#ef4444" : "#22c55e";
            ctx.lineWidth = 6;
            ctx.shadowBlur = 25;
            ctx.shadowColor = crashed ? "#ef4444" : "#22c55e";
            ctx.beginPath();

            const maxMult = Math.max(...graphPoints.map(p => p.y)) * 1.1 || 10;
            for (let i = 0; i < graphPoints.length; i++) {
                const point = graphPoints[i];
                const x = (point.x / 400) * canvas.width;           // normalize time
                const y = canvas.height - (point.y / maxMult) * (canvas.height - 30);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Glow end dot
            const last = graphPoints[graphPoints.length - 1];
            const lastX = (last.x / 400) * canvas.width;
            const lastY = canvas.height - (last.y / maxMult) * (canvas.height - 30);
            ctx.fillStyle = crashed ? "#ef4444" : "#22c55e";
            ctx.beginPath();
            ctx.arc(lastX, lastY, 9, 0, Math.PI * 2);
            ctx.fill();
        }

        // ====================== ANIMATION LOOP ======================
        function gameLoop() {
            if (!isFlying) return;

            const elapsed = (Date.now() - startTime) / 1000;           // seconds
            multiplier = 1 + (elapsed * 1.8);                          // natural speed (feels like real Crash)

            // Update display
            multEl.textContent = multiplier.toFixed(2);
            multEl.className = `multiplier ${multiplier < 2 ? 'text-orange-400' : multiplier < 10 ? 'text-emerald-400' : 'text-yellow-300'}`;

            // Add point to graph
            graphPoints.push({ x: elapsed * 35, y: multiplier });

            drawGraph();

            // Check crash
            if (multiplier >= crashPoint && !crashed) {
                crashed = true;
                handleCrash();
                return;
            }

            animationFrame = requestAnimationFrame(gameLoop);
        }

        // ====================== GAME STATE HANDLERS ======================
        function startRound() {
            if (balance < currentBet) {
                alert("Not enough balance!");
                return;
            }

            balance -= currentBet;
            balanceEl.textContent = balance.toFixed(2);

            // Reset everything
            isFlying = true;
            crashed = false;
            multiplier = 1.00;
            graphPoints = [{ x: 0, y: 1 }];
            crashPoint = generateCrashPoint();
            startTime = Date.now();

            multEl.textContent = "1.00";
            multEl.className = "multiplier text-emerald-400";
            statusEl.textContent = "FLYING...";
            statusEl.className = "absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/70 px-6 py-1 rounded-3xl text-sm font-medium text-emerald-400";

            actionBtn.textContent = "CASH OUT";
            actionBtn.className = "mt-5 w-full py-6 text-2xl font-bold rounded-3xl transition-all active:scale-95 bg-red-500 text-white";

            drawGraph();
            gameLoop();
        }

        function cashOut() {
            if (!isFlying || crashed) return;

            cancelAnimationFrame(animationFrame);
            isFlying = false;
            cashOutMultiplier = multiplier;

            const winnings = currentBet * cashOutMultiplier;
            balance += winnings;
            balanceEl.textContent = balance.toFixed(2);

            // Show win
            statusEl.innerHTML = `✅ CASHED OUT @ <span class="text-emerald-400">${cashOutMultiplier.toFixed(2)}x</span><br>
                                 <span class="text-xs text-emerald-400">+${(winnings - currentBet).toFixed(2)} NGN</span>`;
            statusEl.className = "absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/80 px-6 py-3 rounded-3xl text-center text-emerald-400 text-sm font-medium";

            actionBtn.textContent = "NEW ROUND";
            actionBtn.className = "mt-5 w-full py-6 text-2xl font-bold rounded-3xl transition-all active:scale-95 bg-emerald-500 text-black";

            // Add to history using the REAL crash point (like real game)
            addToHistory(crashPoint);
        }

        function handleCrash() {
            cancelAnimationFrame(animationFrame);
            isFlying = false;
            crashed = true;

            multEl.textContent = crashPoint.toFixed(2);
            multEl.className = "multiplier text-red-500";

            statusEl.textContent = `💥 BUST @ ${crashPoint.toFixed(2)}x`;
            statusEl.className = "absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/80 px-6 py-3 rounded-3xl text-red-500 text-sm font-medium";

            actionBtn.textContent = "NEW ROUND";
            actionBtn.className = "mt-5 w-full py-6 text-2xl font-bold rounded-3xl transition-all active:scale-95 bg-emerald-500 text-black";

            // Add the crash to history
            addToHistory(crashPoint);
        }

        function resetForNewRound() {
            isFlying = false;
            crashed = false;
            multiplier = 1.00;
            graphPoints = [];
            multEl.textContent = "1.00";
            multEl.className = "multiplier text-emerald-400";
            statusEl.textContent = "PLACE YOUR BET";
            statusEl.className = "absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/70 px-6 py-1 rounded-3xl text-sm font-medium text-zinc-300";

            actionBtn.textContent = "BET";
            actionBtn.className = "mt-5 w-full py-6 text-2xl font-bold rounded-3xl transition-all active:scale-95 bg-emerald-500 text-black";

            drawGraph();
        }

        function handleAction() {
            if (!isFlying) {
                if (actionBtn.textContent === "BET") {
                    startRound();
                } else {
                    resetForNewRound();
                }
            } else {
                cashOut();
            }
        }

        // ====================== HISTORY ======================
        function addToHistory(crashMult) {
            const newEntry = {
                id: nextGameId++,
                mult: parseFloat(crashMult.toFixed(2)),
                hash: generateFakeHash()
            };
            historyData.unshift(newEntry);
            if (historyData.length > 15) historyData.pop();

            renderRecentBar();
            renderHistoryList();
        }

        function renderRecentBar() {
            const container = document.getElementById("recent-bar");
            container.innerHTML = "";
            const recent = historyData.slice(0, 5);

            recent.forEach(item => {
                const color = item.mult < 2 ? "text-orange-400" : item.mult < 10 ? "text-emerald-400" : "text-yellow-300";
                const dotColor = item.mult < 2 ? "bg-orange-400" : item.mult < 10 ? "bg-emerald-400" : "bg-yellow-300";

                const div = document.createElement("div");
                div.className = "flex flex-col items-center min-w-[62px]";
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-2xl ${dotColor} flex items-center justify-center dot mb-1">
                        <span class="text-[10px] font-black text-black">•</span>
                    </div>
                    <span class="\( {color} text-xs font-bold"> \){item.mult}x</span>
                `;
                container.appendChild(div);
            });
        }

        function renderHistoryList() {
            const container = document.getElementById("history-list");
            container.innerHTML = "";

            historyData.forEach(item => {
                const color = item.mult < 2 ? "text-orange-400" : item.mult < 10 ? "text-emerald-400" : "text-yellow-300";
                const dotColor = item.mult < 2 ? "bg-orange-400" : item.mult < 10 ? "bg-emerald-400" : "bg-yellow-300";

                const row = document.createElement("div");
                row.className = "grid grid-cols-12 py-4 px-3 hover:bg-zinc-800/50 transition-colors";
                row.innerHTML = `
                    <div class="col-span-5 flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full ${dotColor}"></div>
                        <span class="font-mono">${item.id}</span>
                    </div>
                    <div class="col-span-3 text-center">
                        <span class="\( {color} font-bold text-xl"> \){item.mult}x</span>
                    </div>
                    <div class="col-span-4 font-mono text-xs text-right text-zinc-500">${item.hash}</div>
                `;
                container.appendChild(row);
            });
        }

        function toggleHistory() {
            const panel = document.getElementById("history-panel");
            panel.classList.toggle("hidden");
        }

        // ====================== BET HELPERS ======================
        function updateBetDisplay() {
            const input = document.getElementById("bet-input");
            currentBet = Math.max(10, parseFloat(input.value) || 100);
            document.getElementById("bet-amount-display").textContent = currentBet;
        }

        function quickBet(amount) {
            if (amount === 500) {
                currentBet = Math.floor(balance * 0.9);
            } else {
                currentBet = Math.min(Math.max(10, currentBet + amount), balance);
            }
            document.getElementById("bet-input").value = currentBet;
            document.getElementById("bet-amount-display").textContent = currentBet;
        }

        // ====================== SHAKE SUPPORT ======================
        function enableShake() {
            let lastX = 0;
            window.addEventListener('devicemotion', e => {
                if (!e.accelerationIncludingGravity || isFlying) return;
                const delta = Math.abs(e.accelerationIncludingGravity.x - lastX);
                if (delta > 14) {
                    resetForNewRound();
                    setTimeout(() => startRound(), 300);
                }
                lastX = e.accelerationIncludingGravity.x;
            });
        }

        // ====================== INIT ======================
        function init() {
            // Tailwind ready
            balanceEl.textContent = balance.toFixed(2);
            
// Render initial UI
            renderRecentBar();
            renderHistoryList();
            
            // Set default bet
            document.getElementById("bet-input").value = currentBet;
            document.getElementById("bet-amount-display").textContent = currentBet;

            // Canvas initial draw
            drawGraph();

            // Shake support
            enableShake();

            // Keyboard support (N = new round)
            document.addEventListener("keydown", e => {
                if (e.key.toLowerCase() === "n" && !isFlying) {
                    resetForNewRound();
                    setTimeout(startRound, 100);
                }
            });

            console.log("%c✅ Full BC.Game style Crash ready! Tap BET to play. History hidden until you tap 📜", "color:#22c55e; font-size:13px");
        }

        window.onload = init;
    </script>
</body>
</html>
